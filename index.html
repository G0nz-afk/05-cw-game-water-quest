<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <h1>
      <img src="img/cw_logo_horizontal.png" alt="charity: water logo">
      <span class="game-title">Water Quest</span>
      <span class="title-spacer" aria-hidden="true"></span>
    </h1>
    <p class="game-instructions">Collect 10 items before time runs out and avoid pollution taps that subtract points!</p>
    <div class="difficulty-controls">
      <label for="difficulty-level">Difficulty:</label>
      <select id="difficulty-level" aria-label="Select game difficulty">
        <option value="easy">Easy (45s)</option>
        <option value="medium" selected>Medium (30s)</option>
        <option value="hard">Hard (20s)</option>
      </select>
    </div>
    <div class="stats">
      <p>Cans Collected: <span id="current-cans">0</span></p>
      <p>Time Left: <span id="timer">30</span>s</p>
    </div>
    <div id="achievements" class="achievement"></div>
    <div class="game-grid"></div>
    <div class="controls">
      <button id="start-game">Start Game</button>
      <button id="reset-game" class="secondary">Reset</button>
    </div>
    <footer class="game-footer" aria-label="charity water links">
      <p>Learn more and support clean water projects:</p>
      <div class="footer-links">
        <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">charity: water Website</a>
        <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate to charity: water</a>
      </div>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
